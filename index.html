<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexTrack v5 — Real-time Asset Tracking</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- App entry point -->
  <script type="module" src="/src/main.js"></script>
</head>
<body>
  <div id="app">
    <!-- Rendered by src/main.js -->
    <div id="loading-screen" style="
      display:flex;align-items:center;justify-content:center;
      height:100vh;background:#080C12;color:#00E5FF;
      font-family:'Syne',sans-serif;font-size:20px;font-weight:700;
      flex-direction:column;gap:16px;
    ">
      <div style="font-size:40px">📍</div>
      <div>NexTrack v5</div>
      <div style="
        width:40px;height:40px;border:3px solid rgba(0,229,255,0.2);
        border-top-color:#00E5FF;border-radius:50%;
        animation:spin .8s linear infinite;
      "></div>
    </div>
  </div>

  <!-- Firebase SDKs (loaded before app scripts) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <!-- Leaflet Geocoder for professional search -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</body>
</html>
